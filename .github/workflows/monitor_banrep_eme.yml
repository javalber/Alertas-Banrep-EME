name: Monitor BanRep EME

on:
  schedule:
    - cron: "0 13,19 * * *"  # 08:00 y 14:00 hora Colombia
  workflow_dispatch:

# Necesario para que el paso "Commit changes if published" pueda hacer
# git push del estado (ultimo_periodo.txt) de vuelta al repo. Sin esto el
# GITHUB_TOKEN es de solo lectura, el push falla y se reenvían correos
# duplicados hasta que alguien actualice el archivo a mano.
permissions:
  contents: write

jobs:
  check_eme:
    runs-on: ubuntu-latest
    environment: GMAIL_APP_PASSWORD

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        run: |
          if [ -z "${GMAIL_APP_PASSWORD}" ]; then
            echo "ERROR: GMAIL_APP_PASSWORD está vacío."
            echo "Verifica si el secret está en Repository secrets o si se configuró el environment correcto para este job."
            exit 1
          fi
          python banrep_eme.py
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

      - name: Commit changes if published
        if: ${{ hashFiles('changed.flag') != '' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -f changed.flag
          git add ultimo_periodo.txt
          git commit -m "Registrar publicación EME: $(cat ultimo_periodo.txt)"
          git push
